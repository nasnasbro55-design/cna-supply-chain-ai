<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; }
      html { font-size: 16px; -webkit-text-size-adjust: 100%; }
      .leaflet-control-zoom {
        position: absolute !important;
        bottom: 36px !important;
        right: 12px !important;
        left: auto !important;
        top: auto !important;
        border: 1px solid #1e2d45 !important;
        border-radius: 4px !important;
      }
      .leaflet-control-zoom a {
        background: #131c2e !important;
        color: #e2e8f0 !important;
        border-bottom: 1px solid #1e2d45 !important;
        font-size: 16px !important;
      }
      .leaflet-control-zoom a:hover {
        background: #1a2540 !important;
      }
      .leaflet-control-attribution {
        font-size: 10px !important;
        background: rgba(15,22,35,0.9) !important;
        color: #64748b !important;
      }
      .leaflet-control-attribution a {
        color: #93c5fd !important;
      }
    </style>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CNA Supply Chain Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
